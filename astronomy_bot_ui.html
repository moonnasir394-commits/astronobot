<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌌 Astrobot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI, sans-serif;
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at top,#1d2b64,#0f0c29,#000);
display:flex;
justify-content:center;
align-items:center;
}

/* stars */
body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(2px 2px at 20px 30px,#fff,transparent),
radial-gradient(2px 2px at 100px 120px,#fff,transparent),
radial-gradient(1px 1px at 220px 80px,#fff,transparent),
radial-gradient(2px 2px at 340px 200px,#fff,transparent),
radial-gradient(1px 1px at 600px 300px,#fff,transparent);
background-size:700px 500px;
animation:stars 25s linear infinite;
opacity:.6;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(500px)}
}

.container{
width:95%;
max-width:900px;
height:92vh;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border-radius:24px;
display:flex;
flex-direction:column;
box-shadow:0 0 40px rgba(0,255,255,.15);
overflow:hidden;
z-index:2;
}

.header{
padding:24px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
background:linear-gradient(90deg,rgba(0,255,255,.1),rgba(255,255,255,.02));
}

.header h1{
font-size:32px;
color:#00eaff;
text-shadow:0 0 15px #00eaff;
}

.header p{
color:#c8f6ff;
margin-top:8px;
}

.messages{
flex:1;
overflow-y:auto;
padding:22px;
display:flex;
flex-direction:column;
gap:14px;
scroll-behavior:smooth;
}

.message{
display:flex;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.user{justify-content:flex-end;}
.bot{justify-content:flex-start;}

.bubble{
max-width:75%;
padding:14px 18px;
border-radius:18px;
line-height:1.5;
white-space:pre-wrap;
font-size:15px;
}

.user .bubble{
background:linear-gradient(135deg,#00eaff,#00bcd4);
color:white;
border-bottom-right-radius:4px;
}

.bot .bubble{
background:rgba(255,255,255,.08);
color:#eefcff;
border:1px solid rgba(255,255,255,.08);
border-bottom-left-radius:4px;
}

.input-box{
display:flex;
gap:10px;
padding:18px;
border-top:1px solid rgba(255,255,255,.08);
}

input{
flex:1;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
}

input::placeholder{
color:#b0dce6;
}

button{
padding:14px 18px;
border:none;
cursor:pointer;
border-radius:14px;
font-weight:700;
transition:.2s;
}

.send{
background:#00eaff;
color:#00121a;
}

.send:hover{
transform:translateY(-2px);
box-shadow:0 0 15px #00eaff;
}

.clear{
background:transparent;
color:#00eaff;
border:1px solid #00eaff;
}

.empty{
text-align:center;
margin-top:60px;
color:#c6f8ff;
line-height:1.7;
font-size:18px;
}

.loading{
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{opacity:.4}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🌌 Astrobot</h1>
<p>Explore stars, galaxies, planets & cosmic wonders ✨</p>
</div>

<div class="messages" id="messages">
<div class="empty">
🔭<br><br>
Ask me anything about the universe!
</div>
</div>

<div class="input-box">
<input id="messageInput" placeholder="Ask about black holes, Mars, stars...">
<button class="send" onclick="sendMessage()">Send 🚀</button>
<button class="clear" onclick="clearChat()">Clear</button>
</div>

</div>

<script>
const API="/api";

async function sendMessage(){

const input=document.getElementById("messageInput");
const text=input.value.trim();
const messages=document.getElementById("messages");

if(!text) return;

input.value="";

const empty=messages.querySelector(".empty");
if(empty) empty.remove();

messages.innerHTML+=`
<div class="message user">
<div class="bubble">${escapeHtml(text)}</div>
</div>
`;

messages.innerHTML+=`
<div class="message bot" id="load">
<div class="bubble loading">Thinking through the cosmos... 🌌</div>
</div>
`;

messages.scrollTop=messages.scrollHeight;

try{

const res=await fetch(`${API}/chat`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data=await res.json();

document.getElementById("load").remove();

const reply=data.response || data.error || "No response";

messages.innerHTML+=`
<div class="message bot">
<div class="bubble">${escapeHtml(reply)}</div>
</div>
`;

messages.scrollTop=messages.scrollHeight;

}catch(err){

document.getElementById("load").remove();

messages.innerHTML+=`
<div class="message bot">
<div class="bubble">❌ Backend connection failed</div>
</div>
`;
}
}

async function clearChat(){

await fetch(`${API}/clear`,{method:"POST"});

document.getElementById("messages").innerHTML=`
<div class="empty">
🔭<br><br>
Ask me anything about the universe!
</div>
`;
}

function escapeHtml(text){
const div=document.createElement("div");
div.innerText=text;
return div.innerHTML;
}

document.getElementById("messageInput")
.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
